<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Final Whistle</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>⚽ Final Whistle</h1>
  </header>

  <main id="app">

    <section id="homePage">
      <h2>Track Every World Cup 2026 Match</h2>

      <div class="card">
        <h3 id="counter">Watched: 0 / 104</h3>

        <button onclick="showGroups()">
          Group Stage
        </button>

        <button onclick="showKnockout()">
          Knockout Stage
        </button>

        <button onclick="showStats()">
          Stats
        </button>
      </div>
    </section>

    <section id="groupsPage" class="hidden">
      <h2>Groups</h2>

      <div id="groupsContainer"></div>

      <button onclick="goHome()">
        Back Home
      </button>
    </section>

    <section id="statsPage" class="hidden">
      <h2>Stats</h2>

      <div class="card">
        <p id="statsWatched">Matches watched: 0</p>
      </div>

      <button onclick="goHome()">
        Back Home
      </button>
    </section>

    <section id="knockoutPage" class="hidden">
      <h2>Knockout Stage</h2>

      <div id="knockoutContainer"></div>

      <button onclick="goHome()">
        Back Home
      </button>
    </section>

  </main>

  <script src="fixtures.js"></script>
  <script src="script.js"></script>
  <script type="module" src="firebase.js"></script>

</body>
</html>
